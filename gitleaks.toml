[build]
verbose = false
paths-allowlist = []
committed-since = ""
live-regex-source = false

[notice]
# Remove secret patterns if you have acceptable false positives
# This ensures stricter detection of real secrets
secretpattern = ""
verifycommits = false
verifysignatures = false

[report]
sarif-level = "high"
exit-code = 1

# Suppress specific secret types or rules (if needed)
[allowlists]
# Add specific rules to ignore by uncommenting:
# Example: ignore pattern in documentation
# patterns = [
#   "entropy:generic"
# ]
# commits = ["<commit-hash>"]  # Suppress findings for specific commits
