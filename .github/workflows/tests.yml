# ============================================================
# Unit Tests + Coverage
# ============================================================
# Runs on every push and pull request to any branch.
# Publishes the Jest coverage report as a downloadable artefact.
# Sister workflow to ci-cd.yml (which handles lint + build + deploy).
# ============================================================

name: Tests

on:
  push:
  pull_request:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit:
    name: Lint & Jest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run Jest with coverage
        run: npm test -- --runInBand --coverage --ci

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-coverage-${{ github.sha }}
          path: coverage
          if-no-files-found: warn
          retention-days: 14
