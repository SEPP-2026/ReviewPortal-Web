# ============================================================
# Dependabot configuration
# ============================================================
# Opens weekly PRs to bump:
#   - npm dependencies (Mondays at 09:00 UTC)
#   - GitHub Actions versions (also Mondays)
#
# Minor + patch bumps are grouped into a single PR per week to
# keep noise low; major bumps stay as individual PRs so they can
# be reviewed deliberately.
# ============================================================

version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - javascript
    groups:
      patch-and-minor:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: chore(deps)
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore(actions)
      include: scope
